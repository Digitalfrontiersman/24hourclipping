server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large media uploads (videos)
    client_max_body_size 1200m;

    # ---- Security headers (applied to every response) ----
    # `always` so they're sent on errors/redirects too. add_header does NOT
    # inherit into locations that declare their own add_header, so these are
    # repeated in /static/ below.
    add_header X-Frame-Options "DENY" always;                       # no framing -> clickjacking (protects /admin, checkout, etc.)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;  # CSP-level anti-framing, defense in depth
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API -> FastAPI backend (same origin, no CORS needed).
    # No add_header here, so it inherits the server-level security headers above.
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Support Server-Sent Events (AI concierge streaming)
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_request_buffering off;
        client_max_body_size 1200m;
    }

    # Long-cache hashed static assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-declared: a location with its own add_header does not inherit the
        # server-level ones, so keep the security headers here too.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
