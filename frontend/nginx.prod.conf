server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large media uploads (videos)
    client_max_body_size 1200m;

    # ---- Compression: big win for JS/CSS/JSON/HTML/SVG ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml application/rss+xml
        application/wasm image/svg+xml font/ttf font/otf application/vnd.ms-fontobject;

    # ---- Security headers (server-level; inherited unless a location sets its own add_header) ----
    add_header X-Frame-Options "DENY" always;                       # no framing -> clickjacking (protects /admin, checkout, etc.)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;  # CSP-level anti-framing, defense in depth
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Server-rendered blog (SEO/AEO) -> FastAPI backend at /blog, /blog/<slug>,
    # /blog/sitemap.xml. Real HTML, no SPA fallback.
    location /blog {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API -> FastAPI backend (same origin). gzip off so the AI concierge SSE
    # stream isn't buffered/delayed by compression.
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        gzip off;
        # Support Server-Sent Events (AI concierge streaming)
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_request_buffering off;
        client_max_body_size 1200m;
    }

    # Hashed build assets (CRA content-hashes these) - immutable, cache a year.
    # ^~ so this wins over the media regex below.
    location ^~ /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # A location with its own add_header does not inherit the server-level
        # ones, so repeat the security headers here.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # Images / video / fonts in public/ (not content-hashed) - cache 30 days.
    # Only `expires` here (no add_header) so the server-level security headers
    # are still inherited.
    location ~* \.(?:png|jpe?g|gif|webp|avif|svg|ico|mp4|webm|woff2?|ttf|otf|eot)$ {
        expires 30d;
        access_log off;
    }

    # SPA + prerendered routes. HTML must NOT be long-cached so deploys take
    # effect immediately (bundle hashes change). no-cache = revalidate (304s).
    location / {
        expires -1;
        try_files $uri $uri/index.html /index.html;
    }
}
