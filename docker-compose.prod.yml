# Production stack: MongoDB + FastAPI backend + React (static, nginx-served).
# The frontend nginx also reverse-proxies /api to the backend, so the whole
# app is one origin. Exposed on host port 8090 (host's own nginx keeps :80/:443).
#
#   docker compose -f docker-compose.prod.yml up -d --build
#   -> http://<server-ip>:8090
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-clipping}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set it in .env}"
      POSTGRES_DB: "${POSTGRES_DB:-clipping}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clipping} -d ${POSTGRES_DB:-clipping}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-clipping}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clipping}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY is required — set it in .env}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      ENABLE_DEMO_LOGIN: "${ENABLE_DEMO_LOGIN:-true}"
      ENABLE_DEMO_ADMIN: "${ENABLE_DEMO_ADMIN:-false}"
      SEED_DEMO_DATA: "${SEED_DEMO_DATA:-true}"
      PAYMENTS_TEST_MODE: "${PAYMENTS_TEST_MODE:-true}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      EMERGENT_LLM_KEY: "${EMERGENT_LLM_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM: "${EMAIL_FROM:-24 Hour Clipping <onboarding@resend.dev>}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      MEDIA_ROOT: /data/media
      UPLOAD_MAX_MB: "${UPLOAD_MAX_MB:-2048}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      SQUARE_ACCESS_TOKEN: "${SQUARE_ACCESS_TOKEN:-}"
      SQUARE_LOCATION_ID: "${SQUARE_LOCATION_ID:-}"
      SQUARE_ENV: "${SQUARE_ENV:-sandbox}"
      SQUARE_CURRENCY: "${SQUARE_CURRENCY:-USD}"
      PAYPAL_CLIENT_ID: "${PAYPAL_CLIENT_ID:-}"
      PAYPAL_SECRET: "${PAYPAL_SECRET:-}"
      PAYPAL_ENV: "${PAYPAL_ENV:-sandbox}"
      PAYPAL_CURRENCY: "${PAYPAL_CURRENCY:-USD}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://clip42.duckdns.org}"
      SOLANA_RPC_URL: "${SOLANA_RPC_URL:-}"
      SOLANA_NETWORK: "${SOLANA_NETWORK:-mainnet}"
      SOLANA_TREASURY_SECRET: "${SOLANA_TREASURY_SECRET:-}"
      SOLANA_USDC_MINT: "${SOLANA_USDC_MINT:-}"
      PLATFORM_FEE_PCT: "${PLATFORM_FEE_PCT:-8}"
    volumes:
      - media_data:/data/media
    expose:
      - "8001"
    healthcheck:
      # Proves the app is up AND Postgres is reachable, so the frontend never
      # fronts a dead backend.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/api/health', timeout=5).status == 200 else 1)"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 40s

  # Automated off-host Postgres backups. The money ledger (transactions,
  # contracts, withdrawals) lived on a single local volume with NO backup -
  # one disk failure was total, unrecoverable loss.
  backup:
    build: ./backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: "${POSTGRES_USER:-clipping}"
      PGPASSWORD: "${POSTGRES_PASSWORD}"
      PGDATABASE: "${POSTGRES_DB:-clipping}"
      BACKUP_INTERVAL_SECONDS: "${BACKUP_INTERVAL_SECONDS:-86400}"
      KEEP_LOCAL: "${BACKUP_KEEP_LOCAL:-7}"
      # Off-host copy (reuses the existing S3 credentials). Leave S3_BUCKET
      # empty to keep local-only dumps.
      S3_BUCKET: "${BACKUP_S3_BUCKET:-${S3_BUCKET:-}}"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-}"
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      AWS_DEFAULT_REGION: "${S3_REGION:-us-east-1}"
    volumes:
      - backup_data:/backups

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8090}:80"

volumes:
  postgres_data:
  media_data:
  backup_data:
