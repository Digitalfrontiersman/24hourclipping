# Production stack: MongoDB + FastAPI backend + React (static, nginx-served).
# The frontend nginx also reverse-proxies /api to the backend, so the whole
# app is one origin. Exposed on host port 8090 (host's own nginx keeps :80/:443).
#
#   docker compose -f docker-compose.prod.yml up -d --build
#   -> http://<server-ip>:8090
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: clipping
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY is required — set it in .env}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      ENABLE_DEMO_LOGIN: "${ENABLE_DEMO_LOGIN:-true}"
      ENABLE_DEMO_ADMIN: "${ENABLE_DEMO_ADMIN:-false}"
      SEED_DEMO_DATA: "${SEED_DEMO_DATA:-true}"
      PAYMENTS_TEST_MODE: "${PAYMENTS_TEST_MODE:-true}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      EMERGENT_LLM_KEY: "${EMERGENT_LLM_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM: "${EMAIL_FROM:-24 Hour Clipping <onboarding@resend.dev>}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      MEDIA_ROOT: /data/media
      UPLOAD_MAX_MB: "${UPLOAD_MAX_MB:-1024}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      ZIINA_API_KEY: "${ZIINA_API_KEY:-}"
      ZIINA_TEST: "${ZIINA_TEST:-true}"
      ZIINA_CURRENCY: "${ZIINA_CURRENCY:-AED}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://clip42.duckdns.org}"
      SOLANA_RPC_URL: "${SOLANA_RPC_URL:-}"
      SOLANA_NETWORK: "${SOLANA_NETWORK:-mainnet}"
      SOLANA_TREASURY_SECRET: "${SOLANA_TREASURY_SECRET:-}"
      SOLANA_USDC_MINT: "${SOLANA_USDC_MINT:-}"
      PLATFORM_FEE_PCT: "${PLATFORM_FEE_PCT:-8}"
    volumes:
      - media_data:/data/media
    expose:
      - "8001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8090}:80"

volumes:
  mongo_data:
  media_data:
